<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>FitTrack — Estilo Livre</title>
<style>
:root{--bg:#06091a;--acc:#F5C400;--blue:#1B3487;--t:#fff;--t2:#8899bb;--bg2:#0b1228;--bg3:#162040;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.wrap{text-align:center;width:100%;max-width:360px}
.logo{width:80px;height:80px;border-radius:50%;background:var(--blue);overflow:hidden;margin:0 auto 16px;box-shadow:0 0 32px #1B348744}
.logo img{width:100%;height:100%;object-fit:cover}
.academy{font-size:11px;color:var(--acc);font-weight:700;letter-spacing:3px;margin-bottom:4px}
.brand-title{font-size:28px;font-weight:800;color:var(--t);margin-bottom:4px}
.subtitle{font-size:13px;color:var(--t2);margin-bottom:40px}
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:var(--bg2);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--t);border:1px solid var(--bg3);transition:border-color .15s,transform .1s;cursor:pointer}
.card:hover,.card:active{border-color:var(--acc);transform:scale(0.99)}
.card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.card-info .card-title{font-size:17px;font-weight:700}
.card-info .card-sub{font-size:13px;color:var(--t2);margin-top:2px}
.arrow{margin-left:auto;color:var(--t2);font-size:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><img src="../logo.jpeg" alt="Estilo Livre"></div>
  <div class="academy">ACADEMIA</div>
  <div class="brand-title">Estilo Livre</div>
  <div class="subtitle">Selecione o seu perfil de acesso</div>
  <div class="cards">
    <a class="card" href="user/index.html">
      <div class="card-icon" style="background:#1B3487">🏋️</div>
      <div class="card-info">
        <div class="card-title">Sou Aluno</div>
        <div class="card-sub">Registrar e acompanhar meus treinos</div>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="card" href="prof/index.html">
      <div class="card-icon" style="background:#9C27B0">👨‍🏫</div>
      <div class="card-info">
        <div class="card-title">Sou Professor</div>
        <div class="card-sub">Gerenciar alunos e fichas de treino</div>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="card" href="admin/index.html">
      <div class="card-icon" style="background:#F5C400">⚙️</div>
      <div class="card-info">
        <div class="card-title" style="color:#06091a">Sou Admin</div>
        <div class="card-sub" style="color:#06091a99">Painel completo de administração</div>
      </div>
      <div class="arrow" style="color:#06091a88">›</div>
    </a>
  </div>
</div>
</body>
</html>
