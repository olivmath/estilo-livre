<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Estilo Livre</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #06091a;
      --bg2:  #0b1228;
      --bg3:  #162040;
      --acc:  #F5C400;
      --blue: #1B3487;
      --blue2:#2352c8;
      --green:#00c853;
      --red:  #f44336;
      --text: #e8eaf6;
      --sub:  #7986cb;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Login screen ── */
    #screen-login { text-align: center; }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 32px;
      box-shadow: 0 0 40px #1B348766;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .tagline { color: var(--sub); font-size: 14px; margin-bottom: 48px; }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      background: #fff;
      color: #1f1f1f;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-google:hover { opacity: .92; }
    .btn-google:active { opacity: .8; }
    .btn-google svg { flex-shrink: 0; }

    /* ── Hello screen ── */
    #screen-hello { text-align: center; display: none; }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 3px solid var(--acc);
      margin: 0 auto 24px;
      object-fit: cover;
      background: var(--bg3);
    }

    .hello-name { font-size: 26px; font-weight: 700; margin-bottom: 8px; }

    .role-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .role-admin { background: var(--acc); color: #000; }
    .role-prof  { background: var(--blue2); color: #fff; }
    .role-aluno { background: var(--green); color: #000; }
    .role-pendente { background: var(--bg3); color: var(--sub); }

    .redirect-msg { color: var(--sub); font-size: 14px; margin-bottom: 24px; }

    .btn-enter {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--acc);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-enter:hover { opacity: .9; }

    .btn-logout {
      margin-top: 16px;
      background: none;
      border: none;
      color: var(--sub);
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }

    /* ── Loading ── */
    #screen-loading { text-align: center; display: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--bg3);
      border-top-color: var(--acc);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #screen-error { text-align: center; display: none; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-msg { color: var(--red); font-size: 14px; margin-bottom: 24px; }
    .btn-retry {
      padding: 12px 24px;
      background: var(--bg3);
      color: var(--text);
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Login -->
  <div id="screen-login">
    <div class="logo"><img src="/logo.jpeg" alt="Estilo Livre" /></div>
    <h1>Estilo Livre</h1>
    <p class="tagline">MAIS QUE ACADEMIA, UM ESTILO DE VIDA!</p>
    <button class="btn-google" id="btn-google">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
        <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
      </svg>
      Continuar com Google
    </button>
  </div>

  <!-- Loading -->
  <div id="screen-loading">
    <div class="spinner"></div>
    <p style="color:var(--sub);font-size:14px">Verificando acesso…</p>
  </div>

  <!-- Hello -->
  <div id="screen-hello">
    <img class="avatar" id="user-photo" src="" alt="foto" />
    <p class="hello-name" id="user-name"></p>
    <span class="role-badge" id="role-badge"></span>
    <p class="redirect-msg" id="redirect-msg"></p>
    <button class="btn-enter" id="btn-enter">Entrar no app</button>
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>

  <!-- Error -->
  <div id="screen-error">
    <div class="error-icon">⚠️</div>
    <p class="error-msg" id="error-text"></p>
    <button class="btn-retry" id="btn-retry">Tentar novamente</button>
  </div>

</div>

<!-- Firebase SDK (ESM via CDN) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  serverTimestamp,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCfTXw6Q4ccI3d1QOBp2f7h1dlpkDpZ4lw",
  authDomain:        "academia-estilo-livre.firebaseapp.com",
  projectId:         "academia-estilo-livre",
  storageBucket:     "academia-estilo-livre.firebasestorage.app",
  messagingSenderId: "398048202907",
  appId:             "1:398048202907:web:4308769929bfef3b42b63e",
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const ROLE_META = {
  admin:    { label: "Admin",      cls: "role-admin", path: "/app/admin/" },
  prof:     { label: "Professor",  cls: "role-prof",  path: "/app/prof/" },
  aluno:    { label: "Aluno",      cls: "role-aluno", path: "/app/user/" },
  pendente: { label: "Pendente",   cls: "role-pendente", path: null },
};

// ── DOM refs ──
const screens = {
  login:   document.getElementById("screen-login"),
  loading: document.getElementById("screen-loading"),
  hello:   document.getElementById("screen-hello"),
  error:   document.getElementById("screen-error"),
};

function show(name) {
  Object.values(screens).forEach(s => (s.style.display = "none"));
  screens[name].style.display = "";
}

function showError(msg) {
  document.getElementById("error-text").textContent = msg;
  show("error");
}

// ── Render hello screen ──
function renderHello(user, role) {
  const meta = ROLE_META[role] ?? ROLE_META.pendente;

  const photo = document.getElementById("user-photo");
  photo.src = user.photoURL || "";
  photo.style.display = user.photoURL ? "" : "none";

  document.getElementById("user-name").textContent = `Bem vindo, ${meta.label} ${user.displayName?.split(" ")[0] ?? ""}!`;

  const badge = document.getElementById("role-badge");
  badge.textContent = meta.label;
  badge.className = `role-badge ${meta.cls}`;

  const enterBtn = document.getElementById("btn-enter");
  if (meta.path) {
    document.getElementById("redirect-msg").textContent = `Você será redirecionado para o app de ${meta.label.toLowerCase()}.`;
    enterBtn.style.display = "";
    enterBtn.onclick = () => { window.location.href = meta.path; };
  } else {
    document.getElementById("redirect-msg").textContent = "Seu acesso ainda não foi liberado. Fale com o administrador.";
    enterBtn.style.display = "none";
  }

  show("hello");
}

// ── Auth state ──
onAuthStateChanged(auth, async (user) => {
  if (!user) { show("login"); return; }

  show("loading");
  try {
    const ref  = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      // First login: create profile with role "aluno" (enforced by Firestore rules)
      await setDoc(ref, {
        email:     user.email,
        name:      user.displayName ?? "",
        photoURL:  user.photoURL ?? "",
        role:      "aluno",
        createdAt: serverTimestamp(),
      });
      renderHello(user, "aluno");
    } else {
      renderHello(user, snap.data().role);
    }
  } catch (err) {
    showError(err.message ?? "Erro desconhecido.");
  }
});

// ── Google login ──
document.getElementById("btn-google").addEventListener("click", async () => {
  show("loading");
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch (err) {
    if (err.code !== "auth/popup-closed-by-user") {
      showError(err.message);
    } else {
      show("login");
    }
  }
});

// ── Logout ──
document.getElementById("btn-logout").addEventListener("click", () => signOut(auth));

// ── Retry ──
document.getElementById("btn-retry").addEventListener("click", async () => {
  const user = auth.currentUser;
  if (!user) { show("login"); return; }
  show("loading");
  try {
    const snap = await getDoc(doc(db, "users", user.uid));
    renderHello(user, snap.exists() ? snap.data().role : "aluno");
  } catch (err) {
    showError(err.message);
  }
});
</script>
</body>
</html>
