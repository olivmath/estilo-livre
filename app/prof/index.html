<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>FitTrack — Professor</title>
<style>
:root{--bg:#06091a;--acc:#F5C400;--blue:#1B3487;--t:#fff;--t2:#8899bb;--bg2:#0b1228;--bg3:#162040;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.wrap{max-width:320px}
.emoji{font-size:64px;margin-bottom:24px}
h1{font-size:26px;font-weight:800;margin-bottom:8px}
p{font-size:14px;color:var(--t2);margin-bottom:32px}
a{display:inline-block;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);padding:12px 24px;color:var(--acc);text-decoration:none;font-size:14px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="emoji">🚧</div>
  <h1>Em breve</h1>
  <p>O painel do Professor está sendo desenvolvido. Por enquanto, use o painel Admin para gerenciar alunos e treinos.</p>
  <a href="../index.html">← Voltar</a>
</div>
</body>
</html>
